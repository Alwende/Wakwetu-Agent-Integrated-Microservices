apiVersion: apps/v1
kind: Deployment
metadata:
  name: wakwetu-banking-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wakwetu-banking
  template:
    metadata:
      labels:
        app: wakwetu-banking
    spec:
      containers:
      - name: banking-api
        image: 194636598053.dkr.ecr.us-east-1.amazonaws.com/wakwetu-banking-backend:latest
        ports:
        - containerPort: 5000
        # Added Health Checks for ELB synchronization
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wakwetu-banking-service
  annotations:
    # This forces the ELB to be public-facing
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: wakwetu-banking
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000